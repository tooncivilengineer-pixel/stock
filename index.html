                                            <input type="text" value={newItem.unit} onChange={e => setNewItem({...newItem, unit: e.target.value})} className="w-full border rounded-lg px-4 py-2 outline-none" required />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-1">จำนวนเงินรวม (บาท)</label>
                                        <input type="number" step="any" value={newItem.totalAmount} onChange={e => setNewItem({...newItem, totalAmount: e.target.value})} className="w-full border rounded-lg px-4 py-2 outline-none" required />
                                    </div>
                                    <div className="flex justify-end gap-2 pt-2">
                                        <button type="button" onClick={() => setIsAddModalOpen(false)} className="px-4 py-2 bg-gray-100 rounded-lg">ยกเลิก</button>
                                        <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg">บันทึก</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal ดูกราฟรายไอเท็ม */}
                    {chartItem && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl w-full max-w-4xl overflow-hidden shadow-xl animate-in fade-in zoom-in duration-200">
                                <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                                    <h3 className="font-bold text-gray-800 text-lg flex items-center gap-2">
                                        <i className="fa-solid fa-chart-line text-purple-600 text-xl"></i> กราฟความก้าวหน้า: {chartItem.name}
                                    </h3>
                                    <button onClick={() => setChartItem(null)} className="text-gray-400 hover:text-gray-600"><i className="fa-solid fa-xmark text-lg"></i></button>
                                </div>
                                <div className="p-6">
                                    {(() => {
                                        let runningQty = 0;
                                        const itemChartData = [];
                                        
                                        const planWeeks = projects.find(p => p.id === activeProjectId)?.plannedWeeks || 12;
                                        const totalWks = Math.max(projectWeeks.length, planWeeks);

                                        itemChartData.push({
                                            name: 'เริ่มโครงการ',
                                            "ผลงานสัปดาห์นี้ (%)": null,
                                            "สะสมจริง (Actual)": 0,
                                            "แผนงาน (Plan)": 0
                                        });

                                        for (let i = 1; i <= totalWks; i++) {
                                            const t = i / planWeeks;
                                            let planPct = t >= 1 ? 100 : 100 * (t * t * (3 - 2 * t));

                                            const weekData = projectWeeks[i - 1];
                                            let accumulatedPct = null;
                                            let thisWeekPct = null;

                                            if (weekData) {
                                                const thisWeekQty = chartItem.progressByWeek?.[weekData.id] || 0;
                                                runningQty += thisWeekQty;
                                                thisWeekPct = chartItem.totalQty > 0 ? (thisWeekQty / chartItem.totalQty) * 100 : 0;
                                                accumulatedPct = chartItem.totalQty > 0 ? (runningQty / chartItem.totalQty) * 100 : 0;
                                            }

                                            itemChartData.push({
                                                name: weekData ? weekData.name : `สัปดาห์ที่ ${i}`,
                                                "ผลงานสัปดาห์นี้ (%)": weekData ? parseFloat(thisWeekPct.toFixed(2)) : null,
                                                "สะสมจริง (Actual)": accumulatedPct !== null ? parseFloat(accumulatedPct.toFixed(2)) : null,
                                                "แผนงาน (Plan)": parseFloat(planPct.toFixed(2))
                                            });
                                        }

                                        return (
                                            <div className="h-[400px] w-full">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <ComposedChart data={itemChartData} margin={{ top: 20, right: 20, left: -20, bottom: 0 }}>
                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E5E7EB" />
                                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#6B7280', fontSize: 12}} dy={10} />
                                                        <YAxis 
                                                            yAxisId="left" 
                                                            axisLine={false} 
                                                            tickLine={false} 
                                                            tick={{fill: '#6B7280', fontSize: 12}} 
                                                            domain={[0, 100]}
                                                            tickFormatter={(val) => `${val}%`}
                                                        />
                                                        <Tooltip 
                                                            cursor={{fill: '#F3F4F6'}}
                                                            contentStyle={{ borderRadius: '12px', border: '1px solid #E5E7EB', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }}
                                                            formatter={(value, name) => value !== null ? [`${value}%`, name] : ['-', name]}
                                                            animationDuration={300}
                                                        />
                                                        <Legend wrapperStyle={{ paddingTop: '20px' }} />
                                                        <Bar isAnimationActive={true} animationDuration={1000} yAxisId="left" dataKey="ผลงานสัปดาห์นี้ (%)" barSize={35} fill="#A855F7" radius={[4, 4, 0, 0]} />
                                                        <Line isAnimationActive={true} animationDuration={1000} yAxisId="left" type="monotone" dataKey="แผนงาน (Plan)" stroke="#9CA3AF" strokeDasharray="5 5" strokeWidth={2} dot={false} activeDot={false} connectNulls />
                                                        <Line isAnimationActive={true} animationDuration={1000} yAxisId="left" type="monotone" dataKey="สะสมจริง (Actual)" stroke="#10B981" strokeWidth={3} dot={{ r: 5, strokeWidth: 2, fill: '#fff' }} activeDot={{ r: 8, stroke: '#10B981', strokeWidth: 2 }} />
                                                    </ComposedChart>
                                                </ResponsiveContainer>
                                            </div>
                                        );
                                    })()}
                                </div>
                            </div>
                        </div>
                    )}
                    {renderModals()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
